<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Health Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0ede8;
  --surface: #ffffff;
  --surface2: #e8e4de;
  --border: rgba(0,0,0,0.08);
  --text: #1a1916;
  --text2: #6b6860;
  --text3: #aaa89f;
  --green: #2a9d6e;
  --green-d: #1a7050;
  --green-l: #e4f5ee;
  --r: 18px;
  --r-sm: 12px;
  --cat-food: #e8763a;
  --cat-sleep: #4a7fc1;
  --cat-behavior: #c14a7f;
  --cat-digestion: #8a6e2a;
  --cat-therapy: #6a4ac1;
  --cat-meds: #4a9c8a;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#131210;--surface:#1c1b18;--surface2:#252420;
  --border:rgba(255,255,255,0.07);--text:#f0ede8;--text2:#9a9890;--text3:#5a5855;
  --green-l:#0d2e1e;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;overscroll-behavior:none}

.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* HOME */
#home{background:var(--bg)}
.home-header{padding:calc(env(safe-area-inset-top,16px) + 16px) 20px 16px;display:flex;align-items:flex-start;justify-content:space-between}
.home-greeting{font-size:13px;color:var(--text2);font-weight:600;letter-spacing:.03em}
.home-title{font-size:26px;font-weight:800;color:var(--text);margin-top:2px;letter-spacing:-.4px}
.streak-pill{background:var(--green-l);color:var(--green-d);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;margin-top:4px}
.home-body{flex:1;padding:0 16px 32px;display:flex;flex-direction:column;gap:12px}
.cat-btn{display:flex;align-items:center;gap:16px;background:var(--surface);border:none;border-radius:var(--r);padding:18px 20px;cursor:pointer;width:100%;text-align:left;font-family:'Nunito',sans-serif;transition:transform .12s;position:relative;overflow:hidden}
.cat-btn:active{transform:scale(.97)}
.cat-icon{font-size:28px;flex-shrink:0;width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.cat-text{flex:1;min-width:0}
.cat-name{font-size:16px;font-weight:700;color:var(--text)}
.cat-hint{font-size:12px;color:var(--text3);margin-top:2px}
.cat-count{font-size:12px;font-weight:700;color:var(--text3);flex-shrink:0}
.cat-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:18px 0 0 18px}

/* FORM */
#form-screen{background:var(--bg)}
.form-header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:0 4px;line-height:1;font-family:'Nunito',sans-serif}
.form-cat-icon{font-size:22px;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.form-cat-name{font-size:16px;font-weight:800;color:var(--text)}
.form-body{padding:20px 16px 40px;display:flex;flex-direction:column;gap:18px;max-width:520px;margin:0 auto;width:100%}

/* Logger select */
.logger-row{display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:var(--r-sm);padding:12px 14px;border:0.5px solid var(--border)}
.logger-label{font-size:12px;font-weight:700;color:var(--text3);white-space:nowrap}
.logger-select{flex:1;background:none;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}

/* Sections */
.form-section{}
.section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;padding-left:2px}
.optional-tag{font-weight:400;text-transform:none;letter-spacing:0;font-size:10px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:9px 16px;border-radius:24px;border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;background:var(--surface);color:var(--text2);font-family:'Nunito',sans-serif;transition:all .12s;line-height:1}
.chip.sel{color:#fff;border-color:transparent}
.chip:active{transform:scale(.94)}

/* Rating */
.rating-row{display:flex;gap:8px;justify-content:space-between}
.rating-btn{flex:1;padding:10px 4px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--surface);font-size:20px;cursor:pointer;text-align:center;transition:all .12s;font-family:'Nunito',sans-serif}
.rating-btn.sel{border-color:transparent}
.rating-btn:active{transform:scale(.93)}

/* Time */
.time-row{display:grid;gap:10px}
.time-row.single{grid-template-columns:1fr}
.time-row.dual{grid-template-columns:1fr 1fr}
.time-row.triple{grid-template-columns:1fr 1fr 1fr}
.time-field{display:flex;flex-direction:column;gap:5px}
.time-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.time-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--text);-webkit-appearance:none;appearance:none;width:100%}
.time-input:focus{outline:none;border-color:var(--green)}
.text-input{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);-webkit-appearance:none;appearance:none;width:100%}
.text-input:focus{outline:none;border-color:var(--green)}
.text-input::placeholder{color:var(--text3);font-weight:600}
.notes-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);min-height:80px;resize:none}
.notes-input:focus{outline:none;border-color:var(--green)}
.notes-input::placeholder{color:var(--text3);font-weight:600}

/* Pouch counter */
.pouch-grid{display:flex;flex-direction:column;gap:8px}
.pouch-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:var(--r-sm);padding:10px 14px;border:0.5px solid var(--border)}
.pouch-name{font-size:13px;font-weight:700;color:var(--text);flex:1}
.pouch-controls{display:flex;align-items:center;gap:10px}
.pouch-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text2);line-height:1}
.pouch-btn:active{transform:scale(.9)}
.pouch-val{font-size:15px;font-weight:800;color:var(--text);min-width:28px;text-align:center}

/* Sub-panel */
.sub-panel{background:var(--surface2);border-radius:var(--r-sm);padding:14px;display:none;flex-direction:column;gap:12px;margin-top:4px}
.sub-panel.open{display:flex}

/* Oz input row */
.oz-row{display:flex;align-items:center;gap:10px}
.oz-input{width:80px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;color:var(--text);text-align:center;-webkit-appearance:none}
.oz-input:focus{outline:none;border-color:var(--green)}
.oz-label{font-size:13px;font-weight:700;color:var(--text2)}

/* Save */
.save-btn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;letter-spacing:-.1px}
.save-btn:active{background:var(--green-d);transform:scale(.98)}
.save-btn:disabled{background:var(--text3)}

/* HISTORY */
#history-screen{background:var(--bg)}
.hist-header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px}
.hist-title{font-size:18px;font-weight:800;color:var(--text)}
.hist-body{flex:1;overflow-y:auto;padding:16px}
.hist-filter{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px}
.hist-filter::-webkit-scrollbar{display:none}
.date-group-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:14px 0 7px;padding-left:2px}
.hist-entry{background:var(--surface);border-radius:var(--r-sm);padding:13px 15px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hist-body2{flex:1;min-width:0}
.hist-top{display:flex;align-items:baseline;gap:8px}
.hist-cat{font-size:13px;font-weight:800;color:var(--text)}
.hist-sub{font-size:12px;color:var(--text2);margin-top:3px;font-weight:600;line-height:1.5}
.hist-note{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic;line-height:1.4}
.hist-by{font-size:10px;color:var(--text3);margin-top:4px;font-weight:700}

/* Bottom nav */
.bottom-nav{background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding:0 0 env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:13px 8px 12px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:'Nunito',sans-serif}
.nav-btn-icon{font-size:20px;line-height:1}
.nav-btn-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.nav-btn.active .nav-btn-label{color:var(--green)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;opacity:0;transition:all .22s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;font-weight:700;line-height:1.7}
.divider{border:none;border-top:0.5px solid var(--border);margin:2px 0}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ══ HOME ══ -->
<div class="screen active" id="home">
  <div class="home-header">
    <div>
      <div class="home-greeting" id="greeting">Good morning</div>
      <div class="home-title">Health Journal</div>
      <div class="streak-pill" id="streak-el">Loading…</div>
    </div>
  </div>
  <div class="home-body">
    <button class="cat-btn" onclick="openForm('food')">
      <div class="cat-accent" style="background:var(--cat-food)"></div>
      <div class="cat-icon" style="background:#fef0e8">🥗</div>
      <div class="cat-text"><div class="cat-name">Food</div><div class="cat-hint">Bottle, pouches, snacks</div></div>
      <div class="cat-count" id="cnt-food">–</div>
    </button>
    <button class="cat-btn" onclick="openForm('sleep')">
      <div class="cat-accent" style="background:var(--cat-sleep)"></div>
      <div class="cat-icon" style="background:#eaf0fc">🌙</div>
      <div class="cat-text"><div class="cat-name">Sleep</div><div class="cat-hint">Bedtime, duration, quality</div></div>
      <div class="cat-count" id="cnt-sleep">–</div>
    </button>
    <button class="cat-btn" onclick="openForm('behavior')">
      <div class="cat-accent" style="background:var(--cat-behavior)"></div>
      <div class="cat-icon" style="background:#fceaf2">💛</div>
      <div class="cat-text"><div class="cat-name">Behavior & mood</div><div class="cat-hint">Mood, behaviors, notes</div></div>
      <div class="cat-count" id="cnt-behavior">–</div>
    </button>
    <button class="cat-btn" onclick="openForm('digestion')">
      <div class="cat-accent" style="background:var(--cat-digestion)"></div>
      <div class="cat-icon" style="background:#f5f0e4">🫁</div>
      <div class="cat-text"><div class="cat-name">Digestion & GI</div><div class="cat-hint">Output, consistency, enema</div></div>
      <div class="cat-count" id="cnt-digestion">–</div>
    </button>
    <button class="cat-btn" onclick="openForm('therapy')">
      <div class="cat-accent" style="background:var(--cat-therapy)"></div>
      <div class="cat-icon" style="background:#eeeaf8">🤝</div>
      <div class="cat-text"><div class="cat-name">Therapy & School</div><div class="cat-hint">PT, OT, Speech, School…</div></div>
      <div class="cat-count" id="cnt-therapy">–</div>
    </button>
    <button class="cat-btn" onclick="openForm('meds')">
      <div class="cat-accent" style="background:var(--cat-meds)"></div>
      <div class="cat-icon" style="background:#e4f4f2">💊</div>
      <div class="cat-text"><div class="cat-name">Medication</div><div class="cat-hint">What, amount, time</div></div>
      <div class="cat-count" id="cnt-meds">–</div>
    </button>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('home',this)"><span class="nav-btn-icon">🏠</span><span class="nav-btn-label">Log</span></button>
    <button class="nav-btn" onclick="showScreen('history-screen',this);loadHistory()"><span class="nav-btn-icon">📋</span><span class="nav-btn-label">History</span></button>
  </div>
</div>

<!-- ══ FORM SCREEN ══ -->
<div class="screen" id="form-screen">
  <div class="form-header">
    <button class="back-btn" onclick="showScreen('home',null)">←</button>
    <div class="form-cat-icon" id="form-icon"></div>
    <div class="form-cat-name" id="form-title"></div>
  </div>
  <div style="flex:1;overflow-y:auto">
    <div class="form-body" id="form-body-inner"></div>
  </div>
</div>

<!-- ══ HISTORY SCREEN ══ -->
<div class="screen" id="history-screen">
  <div class="hist-header">
    <button class="back-btn" onclick="showScreen('home',null)">←</button>
    <div class="hist-title">History</div>
  </div>
  <div class="hist-body">
    <div class="hist-filter" id="hist-filter">
      <button class="chip sel" style="background:var(--text);color:var(--bg)" onclick="filterHist('all',this)">All</button>
      <button class="chip" onclick="filterHist('Food',this)">🥗 Food</button>
      <button class="chip" onclick="filterHist('Sleep',this)">🌙 Sleep</button>
      <button class="chip" onclick="filterHist('Behavior',this)">💛 Behavior</button>
      <button class="chip" onclick="filterHist('Digestion',this)">🫁 Digestion</button>
      <button class="chip" onclick="filterHist('Therapy & School',this)">🤝 Therapy</button>
      <button class="chip" onclick="filterHist('Medication',this)">💊 Meds</button>
    </div>
    <div id="hist-list"><div class="empty">Loading…</div></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="showScreen('home',this)"><span class="nav-btn-icon">🏠</span><span class="nav-btn-label">Log</span></button>
    <button class="nav-btn active" onclick="showScreen('history-screen',this);loadHistory()"><span class="nav-btn-icon">📋</span><span class="nav-btn-label">History</span></button>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyz6l1tr_6TxXj3TntgX7hHgbR123EqjhRxdWy-KWbvDwdsiEmEuXcng6Q-wrfyc8EI/exec';
const LOGGERS = ['Julia','Paul','Emily','Karleen','Laurel','Grandpa & Grandma','Papa & Nana','Other'];
const CAT_COLOR = {Food:'#e8763a',Sleep:'#4a7fc1',Behavior:'#c14a7f',Digestion:'#8a6e2a','Therapy & School':'#6a4ac1',Medication:'#4a9c8a'};
const CAT_ICON  = {Food:'🥗',Sleep:'🌙',Behavior:'💛',Digestion:'🫁','Therapy & School':'🤝',Medication:'💊'};

let currentCat = null;
let allEntries = [];
let histFilter = 'all';
let savedLogger = localStorage.getItem('hj-logger') || '';
let pouchCounts = {};

// Init
const hr = new Date().getHours();
document.getElementById('greeting').textContent = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
loadEntryCounts();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── LOGGER SELECT HTML ─────────────────────────────────────
function loggerSelectHTML() {
  const opts = LOGGERS.map(n=>`<option value="${n}"${n===savedLogger?' selected':''}>${n}</option>`).join('');
  return `<div class="logger-row">
    <span class="logger-label">Logging as</span>
    <select class="logger-select" id="logger-name" onchange="savedLogger=this.value;localStorage.setItem('hj-logger',this.value)">
      <option value="">Select…</option>${opts}
    </select>
  </div>`;
}

// ── TIME SECTION HTML ──────────────────────────────────────
function timeSectionHTML(mode='single', labels=['Time']) {
  if (mode === 'single') {
    return `<div class="form-section">
      <div class="section-label">Time <span class="optional-tag">(optional)</span></div>
      <div class="time-row single"><div class="time-field">
        <input type="time" class="time-input" id="f-time-start">
      </div></div>
    </div>`;
  }
  if (mode === 'triple') {
    return `<div class="form-section">
      <div class="section-label">Times</div>
      <div class="time-row triple">
        <div class="time-field"><div class="time-label">${labels[0]}</div><input type="time" class="time-input" id="f-time-inbed"></div>
        <div class="time-field"><div class="time-label">${labels[1]}</div><input type="time" class="time-input" id="f-time-asleep"></div>
        <div class="time-field"><div class="time-label">${labels[2]}</div><input type="time" class="time-input" id="f-time-awake"></div>
      </div>
    </div>`;
  }
  return `<div class="form-section">
    <div class="section-label">Time</div>
    <div class="time-row dual">
      <div class="time-field"><div class="time-label">${labels[0]}</div><input type="time" class="time-input" id="f-time-start"></div>
      <div class="time-field"><div class="time-label">${labels[1]}</div><input type="time" class="time-input" id="f-time-end"></div>
    </div>
  </div>`;
}

function notesHTML(placeholder='Anything worth noting…') {
  return `<div class="form-section">
    <div class="section-label">Notes <span class="optional-tag">(optional)</span></div>
    <textarea class="notes-input" id="f-notes" placeholder="${placeholder}" rows="3"></textarea>
  </div>`;
}

function saveBtnHTML(color) {
  return `<button class="save-btn" id="save-btn" style="background:${color}" onclick="saveEntry()">Save entry</button>`;
}

function dateHTML() {
  return `<div class="form-section">
    <div class="section-label">Date</div>
    <input type="date" id="f-date" class="time-input" style="width:100%" value="${new Date().toISOString().slice(0,10)}">
  </div>`;
}

// ── CHIP HELPERS ───────────────────────────────────────────
function chipsHTML(fieldId, options, color, multiSelect=false, defaultSel=null) {
  return options.map(o => {
    const isSel = o === defaultSel;
    return `<button class="chip${isSel?' sel':''}" style="${isSel?`background:${color};color:#fff`:''}"
      onclick="${multiSelect?`toggleChip(this,'${color}')`:`selectChip(this,'${fieldId}','${color}')`}"
      data-field="${fieldId}" data-value="${o}">${o}</button>`;
  }).join('');
}

function selectChip(el, fieldId, color) {
  document.querySelectorAll(`.chip[data-field="${fieldId}"]`).forEach(c=>{c.classList.remove('sel');c.style.background='';c.style.color='';});
  el.classList.add('sel'); el.style.background=color; el.style.color='#fff';
}

function toggleChip(el, color) {
  if (el.classList.contains('sel')) { el.classList.remove('sel'); el.style.background=''; el.style.color=''; }
  else { el.classList.add('sel'); el.style.background=color; el.style.color='#fff'; }
}

function getChipVal(fieldId, multi=false) {
  const sels = [...document.querySelectorAll(`.chip[data-field="${fieldId}"].sel`)].map(c=>c.dataset.value);
  return multi ? sels.join(', ') : (sels[0]||'');
}

// ── RATING HELPER ──────────────────────────────────────────
function ratingHTML(fieldId, options, labels, color) {
  return options.map((o,i)=>`<button class="rating-btn${i===2?' sel':''}" style="${i===2?`background:${color};border-color:${color}`:''}"
    title="${labels[i]}" data-field="${fieldId}" data-value="${labels[i]}"
    onclick="selectRating(this,'${fieldId}','${color}')">${o}</button>`).join('');
}

function selectRating(el, fieldId, color) {
  document.querySelectorAll(`.rating-btn[data-field="${fieldId}"]`).forEach(b=>{b.classList.remove('sel');b.style.background='';b.style.borderColor='';});
  el.classList.add('sel'); el.style.background=color; el.style.borderColor=color;
}

function getRatingVal(fieldId) {
  const sel = document.querySelector(`.rating-btn[data-field="${fieldId}"].sel`);
  return sel ? sel.dataset.value : '';
}

// ── POUCH COUNTER ──────────────────────────────────────────
function pouchGridHTML(panelId, flavors) {
  return flavors.map(f => {
    const key = panelId+'|'+f;
    return `<div class="pouch-row">
      <div class="pouch-name">${f}</div>
      <div class="pouch-controls">
        <button class="pouch-btn" onclick="adjustPouch('${key}',-0.5)">−</button>
        <div class="pouch-val" id="pv-${CSS.escape(key)}">0</div>
        <button class="pouch-btn" onclick="adjustPouch('${key}',0.5)">+</button>
      </div>
    </div>`;
  }).join('');
}

function adjustPouch(key, delta) {
  const cur = pouchCounts[key] || 0;
  const next = Math.max(0, Math.min(3, Math.round((cur + delta) * 2) / 2));
  pouchCounts[key] = next;
  const el = document.getElementById('pv-' + CSS.escape(key));
  if (el) el.textContent = next === 0 ? '0' : next % 1 === 0 ? next : next.toFixed(1);
}

function getPouchSummary(panelId, flavors) {
  return flavors.map(f => {
    const v = pouchCounts[panelId+'|'+f] || 0;
    return v > 0 ? `${f}: ${v%1===0?v:v.toFixed(1)}` : null;
  }).filter(Boolean).join(', ');
}

// ── OPEN FORM ──────────────────────────────────────────────
function openForm(cat) {
  currentCat = cat;
  pouchCounts = {};
  const color = ({food:'#e8763a',sleep:'#4a7fc1',behavior:'#c14a7f',digestion:'#8a6e2a',therapy:'#6a4ac1',meds:'#4a9c8a'})[cat];
  const icon  = ({food:'🥗',sleep:'🌙',behavior:'💛',digestion:'🫁',therapy:'🤝',meds:'💊'})[cat];
  const bg    = ({food:'#fef0e8',sleep:'#eaf0fc',behavior:'#fceaf2',digestion:'#f5f0e4',therapy:'#eeeaf8',meds:'#e4f4f2'})[cat];
  const label = ({food:'Food',sleep:'Sleep',behavior:'Behavior & mood',digestion:'Digestion & GI',therapy:'Therapy & School',meds:'Medication'})[cat];

  document.getElementById('form-icon').textContent = icon;
  document.getElementById('form-icon').style.background = bg;
  document.getElementById('form-title').textContent = label;

}

function updateFoodPanels() {
  const selected = [...document.querySelectorAll('.chip[data-field="food-type"].sel')].map(c=>c.dataset.value);
  const map = {
    'Bottle':'panel-bottle','Serenity':'panel-serenity','Real Foods':'panel-realfoods',
    'Applesauce':'panel-applesauce','Yogurt':'panel-yogurt','Cheetos':'panel-cheetos','Other':'panel-other'
  };
  Object.entries(map).forEach(([key,panelId]) => {
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.toggle('open', selected.includes(key));
  });
}

// ── SAVE ──────────────────────────────────────────────────
async function saveEntry() {
  const btn = document.getElementById('save-btn');
  const logger = document.getElementById('logger-name')?.value || '';
  if (logger) { savedLogger = logger; localStorage.setItem('hj-logger', logger); }

  const cat = currentCat;
  const catLabel = {food:'Food',sleep:'Sleep',behavior:'Behavior',digestion:'Digestion',therapy:'Therapy & School',meds:'Medication'}[cat];
  const date = document.getElementById('f-date')?.value || new Date().toISOString().slice(0,10);

  // Time fields
  let startTime = '', endTime = '';
  if (cat === 'sleep') {
    startTime = document.getElementById('f-time-asleep')?.value || '';
    endTime   = document.getElementById('f-time-awake')?.value  || '';
  } else if (cat === 'therapy') {
    startTime = document.getElementById('f-time-start')?.value || '';
    endTime   = document.getElementById('f-time-end')?.value   || '';
  } else {
    startTime = document.getElementById('f-time-start')?.value || '';
  }

  // Build subcategory summary
  let subparts = [];

  if (cat === 'food') {
    const types = [...document.querySelectorAll('.chip[data-field="food-type"].sel')].map(c=>c.dataset.value);
    subparts.push(...types);
    if (types.includes('Bottle')) {
      const oz = document.getElementById('bottle-oz')?.value;
      if (oz) subparts.push(oz + ' oz');
      const adds = getChipVal('bottle-add', true);
      if (adds) subparts.push(adds);
    }
    if (types.includes('Serenity')) {
      const s = getPouchSummary('serenity',['Bison','Beef','Chicken','Turkey','Salmon','Squash','Roots','Carrots','Sweet Potato']);
      if (s) subparts.push('Serenity: ' + s);
    }
    if (types.includes('Real Foods')) {
      const s = getPouchSummary('realfoods',['Quinoa, Kale, Hemp','Turkey, Sweet Potato, Peaches','Chicken, Carrots, Brown Rice','Salmon, Oats, Squash','Eggs, Apples, Oats','Prunes, Pears, Pumpkin']);
      if (s) subparts.push('Real Foods: ' + s);
    }
    if (types.includes('Applesauce')) {
      const s = getPouchSummary('applesauce',['Apple','Apple-Cinnamon']);
      if (s) subparts.push('Applesauce: ' + s);
    }
    if (types.includes('Yogurt')) {
      const s = getPouchSummary('yogurt',['Vanilla','Strawberry']);
      if (s) subparts.push('Yogurt: ' + s);
    }
    if (types.includes('Cheetos')) {
      const amt = getChipVal('cheetos-amt');
      if (amt) subparts.push('Cheetos: ' + amt);
    }
    if (types.includes('Other')) {
      const food = document.getElementById('other-food')?.value;
      const amt  = document.getElementById('other-amount')?.value;
      if (food) subparts.push(food + (amt ? ' · ' + amt : ''));
    }
  } else if (cat === 'sleep') {
    subparts.push(getChipVal('bedtime-mood'));
    const inBed   = document.getElementById('f-time-inbed')?.value   || '';
    const asleep  = document.getElementById('f-time-asleep')?.value  || '';
    const awake   = document.getElementById('f-time-awake')?.value   || '';
    if (inBed)  subparts.push('In bed: ' + formatTime(inBed));
    if (asleep) subparts.push('Asleep: ' + formatTime(asleep));
    if (awake)  subparts.push('Awake: '  + formatTime(awake));
    startTime = asleep; endTime = awake;
    subparts.push(getRatingVal('sleep-quality'));
  } else if (cat === 'behavior') {
    subparts.push(getRatingVal('overall-mood'));
    subparts.push(getChipVal('mood-desc'));
    const behaviors = getChipVal('behaviors', true);
    if (behaviors) subparts.push(behaviors);
  } else if (cat === 'digestion') {
    subparts.push(getChipVal('diaper-type'));
    const size = getChipVal('diaper-size');
    if (size) subparts.push(size);
    const cons = getChipVal('consistency');
    if (cons) subparts.push(cons);
    subparts.push('Enema: ' + (getChipVal('enema') || 'No'));
  } else if (cat === 'therapy') {
    subparts.push(getChipVal('therapy-type'));
    subparts.push(getRatingVal('engagement'));
  } else if (cat === 'meds') {
    const name = document.getElementById('med-name')?.value;
    const amt  = document.getElementById('med-amount')?.value;
    if (name) subparts.push(name);
    if (amt)  subparts.push(amt);
  }

  const payload = {
    category:    catLabel,
    subcategory: subparts.filter(Boolean).join(' · '),
    rating:      '',
    notes:       document.getElementById('f-notes')?.value?.trim() || '',
    loggedBy:    logger,
    date,
    startTime,
    endTime
  };

  btn.innerHTML = '<div class="spin"></div>';
  btn.disabled = true;

  try {
    await fetch(SHEET_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    allEntries.unshift({ category: catLabel, subcategory: payload.subcategory, notes: payload.notes, logged_by: logger, date, start_time: startTime, end_time: endTime, timestamp: new Date().toISOString() });
    updateCounts();
    toast('✓ Saved to Google Sheet');
    setTimeout(() => showScreen('home'), 900);
  } catch {
    btn.innerHTML = 'Save entry';
    btn.disabled = false;
    toast('⚠️ Could not save — check connection');
  }
}

// ── COUNTS & STREAK ────────────────────────────────────────
async function loadEntryCounts() {
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    if (data.status === 'success') {
      allEntries = (data.entries || []).reverse();
      updateCounts(); updateStreak();
    }
  } catch { updateStreak(); }
}

function updateCounts() {
  const map = {food:'Food',sleep:'Sleep',behavior:'Behavior',digestion:'Digestion',therapy:'Therapy & School',meds:'Medication'};
  Object.entries(map).forEach(([k,v]) => {
    const n = allEntries.filter(e=>e.category===v).length;
    const el = document.getElementById('cnt-'+k);
    if (el) el.textContent = n || '';
  });
}

function updateStreak() {
  const days = new Set(allEntries.map(e=>(e.date||'').slice(0,10)).filter(Boolean));
  const sorted = [...days].sort().reverse();
  let streak=0, cur=new Date(); cur.setHours(0,0,0,0);
  for (const ds of sorted) {
    const d=new Date(ds+'T12:00:00');
    if (Math.round((cur-d)/86400000)<=1){streak++;cur=d;}else break;
  }
  const el = document.getElementById('streak-el');
  if (el) el.textContent = streak>0 ? `🔥 ${streak} day streak` : 'Start logging today';
}

// ── HISTORY ────────────────────────────────────────────────
let historyLoaded = false;
async function loadHistory() {
  if (historyLoaded && allEntries.length) { renderHistory(); return; }
  document.getElementById('hist-list').innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res = await fetch(SHEET_URL);
    const data = await res.json();
    if (data.status === 'success') {
      allEntries = (data.entries||[]).reverse();
      historyLoaded = true;
      updateCounts(); updateStreak(); renderHistory();
    }
  } catch {
    document.getElementById('hist-list').innerHTML = '<div class="empty">Could not load</div>';
  }
}

function filterHist(f, el) {
  histFilter = f;
  document.querySelectorAll('#hist-filter .chip').forEach(c=>{c.classList.remove('sel');c.style.background='';c.style.color='';});
  el.classList.add('sel');
  el.style.background = f==='all'?'var(--text)':(CAT_COLOR[f]||'var(--text)');
  el.style.color = '#fff';
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('hist-list');
  const filtered = histFilter==='all'?allEntries:allEntries.filter(e=>e.category===histFilter);
  if (!filtered.length){list.innerHTML='<div class="empty">No entries yet</div>';return;}
  let lastDate='';
  list.innerHTML = filtered.slice(0,100).map(e=>{
    const rawDate = (e.date||'').slice(0,10);
    const displayDate = rawDate ? new Date(rawDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) : '';
    const dateHdr = displayDate!==lastDate?`<div class="date-group-label">${displayDate}</div>`:'';
    lastDate = displayDate;
    const color = CAT_COLOR[e.category]||'#888';
    const icon  = CAT_ICON[e.category]||'📝';
    let timeStr='';
    if (e.start_time && e.end_time) timeStr=formatTime(e.start_time)+' – '+formatTime(e.end_time);
    else if (e.start_time) timeStr=formatTime(e.start_time);
    const sub = [e.subcategory, timeStr].filter(Boolean).join('  ·  ');
    return dateHdr+`<div class="hist-entry">
      <div class="hist-dot" style="background:${color}"></div>
      <div class="hist-body2">
        <div class="hist-top">
          <span style="font-size:14px;margin-right:4px">${icon}</span>
          <span class="hist-cat">${e.category}</span>
          ${e.logged_by?`<span class="hist-by" style="margin-left:auto">${e.logged_by}</span>`:''}
        </div>
        ${sub?`<div class="hist-sub">${sub}</div>`:''}
        ${e.notes?`<div class="hist-note">${String(e.notes).slice(0,120)}${String(e.notes).length>120?'…':''}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function formatTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;
}

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2400);
}
